name: Sky Recovery Build

on:
  workflow_dispatch:
    inputs:
      MANIFEST_URL:
        description: 'Manifest URL'
        required: true
        default: 'https://github.com/AltafYafai/sky-recovery-manifest.git'
      MANIFEST_BRANCH:
        description: 'Manifest Branch'
        required: true
        default: 'main'
      DEVICE_TREE:
        description: 'Custom Recovery Tree'
        required: true
        default: 'https://github.com/AltafYafai/device_xiaomi_sky-recovery'
      DEVICE_TREE_BRANCH:
        description: 'Custom Recovery Tree Branch'
        required: true
        default: 'TWRP'
      DEVICE_PATH:
        description: 'Specify your device path.'
        required: true
        default: 'device/xiaomi/sky'
      DEVICE_NAME:
        description: 'Specify your Device Codename.'
        required: true
        default: 'sky'
      BUILD_TARGET:
        description: 'Specify your Build Target'
        required: true
        default: 'recovery'
        type: choice
        options:
        - recovery
        - boot
        - vendorboot

jobs:
  build:
    name: Build Sky Recovery for ${{ github.event.inputs.DEVICE_NAME }}
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
      TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      DEVICE: ${{ github.event.inputs.DEVICE_NAME }}
    permissions:
      contents: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Get Commit Info
      id: commit-info
      run: |
        cd ${GITHUB_WORKSPACE}
        # If device tree already exists, capture its info
        if [ -d "device/xiaomi/sky" ]; then
          echo "COMMIT_ID=$(git -C device/xiaomi/sky rev-parse --short HEAD 2>/dev/null || echo 'N/A')" >> $GITHUB_ENV
          echo "COMMIT_MSG=$(git -C device/xiaomi/sky log -1 --pretty=format:'%s' 2>/dev/null || echo 'N/A')" >> $GITHUB_ENV
        else
          echo "COMMIT_ID=pending" >> $GITHUB_ENV
          echo "COMMIT_MSG=pending" >> $GITHUB_ENV
        fi

    - name: Notify Build Started
      id: notify-start
      run: |
        BUILD_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        MSG=$(printf "☁️ *Sky Recovery Build*\n\n📱 *Device:* \`${{ env.DEVICE }}\`\n🔧 *Target:* \`${{ github.event.inputs.BUILD_TARGET }}image\`\n👤 *Maintainer:* [Altaf Yafai](https://github.com/AltafYafai)\n\n📝 *Commit:* \`${{ env.COMMIT_ID }}\`\n📋 *Message:* \`${{ env.COMMIT_MSG }}\`\n\n🔄 *Status:* \`⏳ Starting...\`\n\n🔗 [View Run](${BUILD_URL})")
        if [ -n "$TG_BOT_TOKEN" ]; then
          RESP=$(curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TG_CHAT_ID}" \
            -d "parse_mode=Markdown" \
            -d "text=${MSG}" \
            -d "disable_web_page_preview=true")
          MSG_ID=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['result']['message_id'])" 2>/dev/null)
          echo "TG_MSG_ID=${MSG_ID}" >> $GITHUB_OUTPUT
        fi

    - name: Clean-up
      uses: rokibhasansagar/slimhub_actions@main

    - name: Swap Space
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 12

    - name: Restore Cached Source
      id: cache-restore
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/SkyRecovery/.repo
        key: sky-recovery-repo-v3-${{ hashFiles('**/default.xml') }}
        restore-keys: |
          sky-recovery-repo-

    - name: Build Environment
      run: |
        sudo apt update
        sudo apt install aria2 curl git repo -y
        git config --global user.name "altafyafai"
        git config --global user.email "altaf.alu@gmail.com"

    - name: Sync Source
      run: |
        # Update Telegram status
        BUILD_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        MSG=$(printf "☁️ *Sky Recovery Build*\n\n📱 *Device:* \`${{ env.DEVICE }}\`\n🔧 *Target:* \`${{ github.event.inputs.BUILD_TARGET }}image\`\n👤 *Maintainer:* [Altaf Yafai](https://github.com/AltafYafai)\n\n📝 *Commit:* \`${{ env.COMMIT_ID }}\`\n📋 *Message:* \`${{ env.COMMIT_MSG }}\`\n\n🔄 *Status:* \`🔄 Syncing Sources...\`\n\n🔗 [View Run](${BUILD_URL})")
        if [ -n "${{ steps.notify-start.outputs.TG_MSG_ID }}" ] && [ -n "$TG_BOT_TOKEN" ]; then
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/editMessageText" \
            -d "chat_id=${TG_CHAT_ID}" \
            -d "message_id=${{ steps.notify-start.outputs.TG_MSG_ID }}" \
            -d "parse_mode=Markdown" \
            -d "text=${MSG}" \
            -d "disable_web_page_preview=true"
        fi

        mkdir -p ${GITHUB_WORKSPACE}/SkyRecovery
        cd ${GITHUB_WORKSPACE}/SkyRecovery

        # Fix stale cache: reset manifests if they exist
        if [ -d ".repo/manifests" ]; then
          cd .repo/manifests && git reset --hard && git clean -fd && cd ../..
        fi

        # Inject GH_TOKEN into manifest URL for private repo access
        MANIFEST_AUTH=$(echo "${{ github.event.inputs.MANIFEST_URL }}" | sed 's|https://|https://${{ secrets.GH_TOKEN }}@|')
        repo init -u ${MANIFEST_AUTH} -b ${{ github.event.inputs.MANIFEST_BRANCH }}
        # Inject token into the local manifest to allow syncing private repos
        sed -i "s|TOKEN|${{ secrets.GH_TOKEN }}|g" .repo/manifests/default.xml
        repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

    - name: Clone Device Tree
      id: clone-tree
      run: |
        cd ${GITHUB_WORKSPACE}/SkyRecovery
        git clone ${{ github.event.inputs.DEVICE_TREE }} -b ${{ github.event.inputs.DEVICE_TREE_BRANCH }} ./device/xiaomi/sky
        echo "COMMIT_ID=$(git -C device/xiaomi/sky rev-parse --short HEAD)" >> $GITHUB_ENV
        echo "COMMIT_MSG=$(git -C device/xiaomi/sky log -1 --pretty=format:"%s")" >> $GITHUB_ENV
        # TWRP uses twrp_ prefix for target product
        echo "TARGET_PRODUCT=twrp_${{ github.event.inputs.DEVICE_NAME }}" >> $GITHUB_ENV

        # Update Telegram with commit info
        BUILD_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        MSG=$(printf "☁️ *Sky Recovery Build*\n\n📱 *Device:* \`${{ env.DEVICE }}\`\n🔧 *Target:* \`${{ github.event.inputs.BUILD_TARGET }}image\`\n👤 *Maintainer:* [Altaf Yafai](https://github.com/AltafYafai)\n\n📝 *Commit:* \`${{ env.COMMIT_ID }}\`\n📋 *Message:* \`${{ env.COMMIT_MSG }}\`\n\n🔄 *Status:* \`🌳 Device Tree Cloned\`\n\n🔗 [View Run](${BUILD_URL})")
        if [ -n "${{ steps.notify-start.outputs.TG_MSG_ID }}" ] && [ -n "$TG_BOT_TOKEN" ]; then
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/editMessageText" \
            -d "chat_id=${TG_CHAT_ID}" \
            -d "message_id=${{ steps.notify-start.outputs.TG_MSG_ID }}" \
            -d "parse_mode=Markdown" \
            -d "text=${MSG}" \
            -d "disable_web_page_preview=true"
        fi

    - name: Patching Source
      run: |
        cd ${GITHUB_WORKSPACE}/SkyRecovery

        python3 << 'PYEOF'
        import os, shutil

        # 1. Fix ICU: java_sdk_library modules need API tracking files that don't exist
        #    Remove ALL java_sdk_library blocks (not needed for recovery build)
        icu_bp = "external/icu/android_icu4j/Android.bp"
        try:
            with open(icu_bp, "r") as f:
                lines = f.readlines()
            
            result = []
            skip = False
            depth = 0
            
            for line in lines:
                stripped = line.strip()
                
                # Start of java_sdk_library block - skip entire block
                if not skip and stripped.startswith("java_sdk_library"):
                    skip = True
                    depth = stripped.count("{") - stripped.count("}")
                    if depth <= 0:
                        skip = False
                    continue
                
                if skip:
                    depth += stripped.count("{") - stripped.count("}")
                    if depth <= 0:
                        skip = False
                    continue
                
                result.append(line)
            
            with open(icu_bp, "w") as f:
                f.writelines(result)
            print("✓ Removed java_sdk_library modules from ICU")
        except Exception as e:
            print(f"Warning: ICU patch failed: {e}")

        # 2. Filter APEX modules - recovery doesn't need APEX and test modules crash Soong.
        #    Instead of clearing the file (which removes needed Soong config types),
        #    we skip 'apex', 'apex_test', 'prebuilt_apex', and 'apex_key' blocks.
        def filter_bp_file(file_path):
            try:
                with open(file_path, "r") as f:
                    lines = f.readlines()
                
                result = []
                skip = False
                depth = 0
                
                for line in lines:
                    stripped = line.strip()
                    
                    # Start of apex related blocks - skip them
                    if not skip and (stripped.startswith("apex {") or 
                                    stripped.startswith("apex_test {") or 
                                    stripped.startswith("prebuilt_apex {") or
                                    stripped.startswith("apex_key {") or
                                    stripped.startswith("apex_defaults {") or
                                    stripped.startswith("apex_binary {") or
                                    stripped.startswith("apex_set {")):
                        skip = True
                        depth = stripped.count("{") - stripped.count("}")
                        if depth <= 0:
                            skip = False
                        continue
                    
                    if skip:
                        depth += stripped.count("{") - stripped.count("}")
                        if depth <= 0:
                            skip = False
                        continue
                    
                    result.append(line)
                
                if len(result) != len(lines):
                    with open(file_path, "w") as f:
                        f.writelines(result)
                    return True
            except Exception as e:
                print(f"Error patching {file_path}: {e}")
            return False

        print("Patching system/apex/Android.bp...")
        if filter_bp_file("system/apex/Android.bp"):
            print("✓ Filtered system/apex/Android.bp")

        # 2.1 Find and disable other APEX modules in the tree that might cause panics
        try:
            import subprocess
            print("Searching for other APEX modules...")
            find_cmd = "find . -name Android.bp -not -path './system/apex/*' -exec grep -lE '^(apex|apex_test|prebuilt_apex|apex_key|apex_defaults|apex_binary|apex_set) \{' {} +"
            files = subprocess.check_output(find_cmd, shell=True).decode().splitlines()
            for bp_file in files:
                if filter_bp_file(bp_file):
                    print(f"  ✓ Patched {bp_file}")
        except Exception as e:
            print(f"Warning: Global APEX search/patch failed: {e}")

        # 3. Fix bionic glob - the clang-builtins path might be a file, replace it with directory
        try:
            bionic_path = "bionic/libc/versioner-dependencies/common/clang-builtins"
            if os.path.islink(bionic_path):
                os.unlink(bionic_path)
            elif os.path.isfile(bionic_path):
                os.remove(bionic_path)
            elif os.path.isdir(bionic_path):
                shutil.rmtree(bionic_path, ignore_errors=True)
            os.makedirs(bionic_path, exist_ok=True)
            # Create a placeholder file inside so it's a valid directory
            placeholder = os.path.join(bionic_path, ".keep")
            if not os.path.exists(placeholder):
                open(placeholder, "w").close()
            print("✓ Fixed bionic glob path")
        except Exception as e:
            print(f"Warning: bionic fix failed: {e}")
        PYEOF

    - name: Building Sky Recovery
      run: |
        # Update Telegram with build status
        BUILD_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        MSG=$(printf "☁️ *Sky Recovery Build*\n\n📱 *Device:* \`${{ env.DEVICE }}\`\n🔧 *Target:* \`${{ github.event.inputs.BUILD_TARGET }}image\`\n👤 *Maintainer:* [Altaf Yafai](https://github.com/AltafYafai)\n\n📝 *Commit:* \`${{ env.COMMIT_ID }}\`\n📋 *Message:* \`${{ env.COMMIT_MSG }}\`\n\n🔄 *Status:* \`🏗️ Compiling...\`\n\n🔗 [View Run](${BUILD_URL})")
        if [ -n "${{ steps.notify-start.outputs.TG_MSG_ID }}" ] && [ -n "$TG_BOT_TOKEN" ]; then
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/editMessageText" \
            -d "chat_id=${TG_CHAT_ID}" \
            -d "message_id=${{ steps.notify-start.outputs.TG_MSG_ID }}" \
            -d "parse_mode=Markdown" \
            -d "text=${MSG}" \
            -d "disable_web_page_preview=true"
        fi

        cd ${GITHUB_WORKSPACE}/SkyRecovery
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        export WITH_DEXPREOPT=false
        export UNSAFE_IGNORE_MISSING_LATEST_API=true
        export BUILD_BROKEN_DUP_RULES=true
        export BUILD_BROKEN_ELF_PREBUILT_PRODUCT_COPY_FILES=true
        export BUILD_BROKEN_MISSING_REQUIRED_MODULES=true
        export BUILD_BROKEN_VINTF_PRODUCT_COPY_FILES=true
        export BUILD_BROKEN_PREBUILT_ELF_FILES=true
        export BUILD_BROKEN_USES_BUILD_COPY_MODULE=true
        export BUILD_BROKEN_MISSING_SYSTEM_RECOVERY=true
        export BUILD_BROKEN_SDK_COVERAGE=true
        export BUILD_BROKEN_INPUT_DIR_MODULES=true
        export OVERRIDE_TARGET_FLATTEN_APEX=true
        export TW_EXCLUDE_APEX=true
        export TARGET_DISABLE_APEX=true
        export DISABLE_ARTIFACT_PATH_REQUIREMENTS=true
        export SELINUX_IGNORE_NEVERALLOWS=true
        lunch twrp_${{ github.event.inputs.DEVICE_NAME }}-eng
        # Clean Soong cache to ensure fresh configuration
        rm -rf out/soong 2>/dev/null
        # Clean only stale intermediates
        rm -rf out/target/product/${{ env.TARGET_PRODUCT }}/*.img 2>/dev/null
        rm -rf out/target/product/${{ env.TARGET_PRODUCT }}/obj/EXECUTABLES 2>/dev/null
        # Build recoveryimage
        set -o pipefail
        mka ${{ github.event.inputs.BUILD_TARGET }}image 2>&1 | tee build.log

    - name: Upload Build Log to Telegram
      if: always()
      run: |
        cd ${GITHUB_WORKSPACE}/SkyRecovery
        if [ -f build.log ]; then
          curl -F chat_id="${TG_CHAT_ID}" -F document=@"build.log" -F caption="📄 *Build Log* for ${{ env.DEVICE }} (${{ env.COMMIT_ID }})" "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendDocument"
        fi

    - name: Set Build Date
      run: |
        echo "BUILD_DATE=$(TZ=Asia/Kolkata date +%Y%m%d)" >> $GITHUB_ENV

    - name: Prepare Artifacts
      id: prep
      run: |
        BUILD_DIR=${GITHUB_WORKSPACE}/SkyRecovery/out/target/product/${{ env.TARGET_PRODUCT }}/
        mkdir -p ${GITHUB_WORKSPACE}/artifacts/

        # Verify build output directory exists
        if [ ! -d "$BUILD_DIR" ]; then
          echo "❌ Build output directory not found: $BUILD_DIR"
          echo "FILES_FOUND=false" >> $GITHUB_OUTPUT
          exit 0
        fi

        # Copy available images
        FOUND_ANY=false
        for img in recovery.img boot.img vendor_boot.img; do
          if [ -f "$BUILD_DIR/$img" ]; then
            cp "$BUILD_DIR/$img" ${GITHUB_WORKSPACE}/artifacts/
            FOUND_ANY=true
          fi
        done

        # Rename for Sky Recovery branding
        if [ -f "${GITHUB_WORKSPACE}/artifacts/recovery.img" ]; then
           mv ${GITHUB_WORKSPACE}/artifacts/recovery.img ${GITHUB_WORKSPACE}/artifacts/Sky-Recovery-Unofficial-${{ github.event.inputs.DEVICE_NAME }}.img
        fi

        if [ "$FOUND_ANY" = true ]; then
          echo "FILES_FOUND=true" >> $GITHUB_OUTPUT
        else
          echo "FILES_FOUND=false" >> $GITHUB_OUTPUT
          echo "⚠️ No build artifacts found. Expected: recovery.img, boot.img, or vendor_boot.img"
        fi

    - name: Upload Release
      if: steps.prep.outputs.FILES_FOUND == 'true'
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ github.workspace }}/artifacts/*
        name: Sky Recovery Project for ${{ github.event.inputs.DEVICE_NAME }} // ${{ env.BUILD_DATE }}
        tag_name: ${{ env.BUILD_DATE }}-${{ github.run_id }}
        body: |
          # ☁️ Sky Recovery Project
          
          **Device:** Redmi 12 5G / Poco M6 Pro 5G / Redmi Note 12R (`${{ github.event.inputs.DEVICE_NAME }}`)
          **Build Date:** `${{ env.BUILD_DATE }}`
          **Maintainer:** [Altaf Yafai](https://github.com/AltafYafai)
          
          ---
          ### 🛠 Build Info
          - **Device Tree Commit:** `${{ env.COMMIT_ID }}`
          - **UI Source:** [Sky Recovery Project](https://github.com/AltafYafai/sky-recovery-project)
          
          *Powered by Material You & Pixel Blue*

    - name: Send Final Telegram Notification
      if: always()
      run: |
        BUILD_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        RELEASE_URL="${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ env.BUILD_DATE }}-${{ github.run_id }}"

        if [ "${{ steps.prep.outputs.FILES_FOUND }}" == "true" ]; then
          STATUS="✅ *Build Successful!*"
          EXTRA=$(printf "\n\n📦 *Download:* [Release Page](${RELEASE_URL})\n\n#SkyRecovery #Success #Sky #MaterialYou")
        else
          STATUS="❌ *Build Failed!*"
          EXTRA=$(printf "\n\n🔍 *Check logs:* [View Console](${BUILD_URL})")
        fi

        MSG=$(printf "☁️ *Sky Recovery Build*\n\n📱 *Device:* \`${{ env.DEVICE }}\`\n🔧 *Target:* \`${{ github.event.inputs.BUILD_TARGET }}image\`\n👤 *Maintainer:* [Altaf Yafai](https://github.com/AltafYafai)\n\n📝 *Commit:* \`${{ env.COMMIT_ID }}\`\n📋 *Message:* \`${{ env.COMMIT_MSG }}\`\n\n${STATUS}\n\n🔗 [View Run](${BUILD_URL})${EXTRA}")
        if [ -n "${{ steps.notify-start.outputs.TG_MSG_ID }}" ] && [ -n "$TG_BOT_TOKEN" ]; then
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/editMessageText" \
            -d "chat_id=${TG_CHAT_ID}" \
            -d "message_id=${{ steps.notify-start.outputs.TG_MSG_ID }}" \
            -d "parse_mode=Markdown" \
            -d "text=${MSG}" \
            -d "disable_web_page_preview=true"
        fi
